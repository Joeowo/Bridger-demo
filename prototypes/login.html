<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - BRIDGER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3B82F6;
      --primary-dark: #2563EB;
      --accent: #F59E0B;
      --bg: #F9FAFB;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --card-bg: #FFFFFF;
      --border: #E5E7EB;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .input-wrapper input:focus {
      border-color: var(--primary);
    }

    .code-input {
      display: flex;
      gap: 12px;
    }

    .code-input input {
      flex: 1;
    }

    .send-code-btn {
      padding: 12px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--primary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .send-code-btn:hover {
      background: #EFF6FF;
      border-color: var(--primary);
    }

    .send-code-btn:disabled {
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background: var(--primary-dark);
    }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: var(--primary);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <div class="logo">BRIDGER</div>
      <div class="tagline">让求职更精准</div>
    </div>

    <div class="card">
      <h2 class="card-title">登录</h2>

      <form onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label>手机号</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22,16.92v3a2,2 0 0,1-2.18,2a19.8,19.8 0 0,1-8.63-3.07a19.5,19.5 0 0,1-6-6a19.8,19.8 0 0,1-3.07-8.67A2,2 0 0,1,4.11,2h3a2,2 0 0,1,2,1.72a12.84,12.84 0 0,0,.7,2.81a2,2 0 0,1-.45,2.11L8.09,9.91a16,16 0 0,0,6,6l1.27-1.27a2,2 0 0,1,2.11-.45a12.84,12.84 0 0,0,2.81.7A2,2 0 0,1,22,16.92z"/>
            </svg>
            <input type="tel" placeholder="请输入手机号" value="138****8888">
          </div>
        </div>

        <div class="form-group">
          <label>验证码</label>
          <div class="code-input">
            <div class="input-wrapper" style="flex:1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7,11V7a5,5 0 0,1,10,0v4"/>
              </svg>
              <input type="text" placeholder="请输入验证码">
            </div>
            <button type="button" class="send-code-btn" onclick="sendCode(this)">获取验证码</button>
          </div>
        </div>

        <button type="submit" class="submit-btn">登录</button>
      </form>

      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15,18 9,12 15,6"/>
        </svg>
        返回首页
      </a>
    </div>
  </div>

  <script>
    function sendCode(btn) {
      let count = 60;
      btn.disabled = true;
      btn.textContent = `${count}s后重发`;

      const timer = setInterval(() => {
        count--;
        if (count > 0) {
          btn.textContent = `${count}s后重发`;
        } else {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = '获取验证码';
        }
      }, 1000);
    }

    function handleSubmit(e) {
      e.preventDefault();
      // Demo: 直接跳转到简历页面
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

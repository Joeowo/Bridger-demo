<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRIDGER - 让求职更精准</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3B82F6;
      --primary-dark: #2563EB;
      --accent: #F59E0B;
      --accent-hover: #D97706;
      --bg: #F9FAFB;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --card-bg: #FFFFFF;
      --ai-bg-start: #E0E7FF;
      --ai-bg-end: #EDE9FE;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Logo背景墙 */
    .logo-wall {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 60px;
      opacity: 0.03;
      z-index: 0;
      pointer-events: none;
    }

    .logo-wall svg {
      width: 120px;
      height: 120px;
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      grid-template-columns: 1fr 380px;
      gap: 40px;
      padding: 60px 80px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Hero区域 */
    .hero {
      grid-column: 1 / 2;
      grid-row: 1 / 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .slogan {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 60px;
      background: linear-gradient(135deg, var(--primary) 0%, #8B5CF6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Hero插图 */
    .hero-illustration {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 60px;
    }

    .person-card {
      width: 140px;
      height: 180px;
      background: var(--card-bg);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      position: relative;
    }

    .person-card svg {
      width: 80px;
      height: 80px;
      margin-bottom: 12px;
    }

    .person-card span {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .thought-bubble {
      position: absolute;
      top: -40px;
      background: var(--primary);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
    }

    .thought-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid var(--primary);
    }

    /* 桥梁Logo */
    .bridge-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .bridge-icon {
      width: 100px;
      height: 60px;
      position: relative;
    }

    .bridge-icon svg {
      width: 100%;
      height: 100%;
    }

    .bridge-name {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 4px;
    }

    /* 信息光点流动动画 */
    .data-flow {
      position: absolute;
      width: 200px;
      height: 2px;
      overflow: visible;
    }

    .data-flow::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.2;
    }

    .data-flow.top {
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .data-flow.bottom {
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .data-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--primary);
    }

    .data-flow.top .data-dot {
      animation: flowRight 2s ease-in-out infinite;
    }

    .data-flow.bottom .data-dot {
      animation: flowLeft 2s ease-in-out infinite;
    }

    .data-flow .data-dot:nth-child(1) { animation-delay: 0s; }
    .data-flow .data-dot:nth-child(2) { animation-delay: 0.4s; }
    .data-flow .data-dot:nth-child(3) { animation-delay: 0.8s; }
    .data-flow .data-dot:nth-child(4) { animation-delay: 1.2s; }

    @keyframes flowRight {
      0% {
        left: 0;
        opacity: 0;
        transform: scale(0.5);
      }
      20% {
        opacity: 1;
        transform: scale(1);
      }
      80% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        left: 100%;
        opacity: 0;
        transform: scale(0.5);
      }
    }

    @keyframes flowLeft {
      0% {
        right: 0;
        opacity: 0;
        transform: scale(0.5);
      }
      20% {
        opacity: 1;
        transform: scale(1);
      }
      80% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        right: 100%;
        opacity: 0;
        transform: scale(0.5);
      }
    }

    /* 流动标签 */
    .flow-label {
      position: absolute;
      font-size: 10px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .flow-label.resume {
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
    }

    .flow-label.offer {
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* 右侧面板 */
    .side-panel {
      grid-column: 2 / 3;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* 核心功能介绍 */
    .features {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .features h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #F3F4F6;
    }

    .feature-item:last-child {
      border-bottom: none;
    }

    .feature-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--ai-bg-start), var(--ai-bg-end));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    .feature-text h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .feature-text p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* START按钮区域 */
    .start-section {
      text-align: center;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: white;
      border: none;
      padding: 18px 48px;
      font-size: 20px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .start-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(245, 158, 11, 0.4);
    }

    .start-btn svg {
      width: 24px;
      height: 24px;
    }

    /* ABOUT US */
    .about-us {
      grid-column: 1 / 2;
      grid-row: 2 / 3;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 32px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .about-us h3 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .about-us p {
      color: var(--text-secondary);
      font-size: 14px;
      max-width: 800px;
    }

    .team-section {
      margin-top: 24px;
      display: flex;
      gap: 32px;
    }

    .team-block h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .team-block p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 40px;
      }

      .hero {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
      }

      .side-panel {
        grid-column: 1 / 2;
        grid-row: 2 / 3;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .about-us {
        grid-column: 1 / 2;
        grid-row: 3 / 4;
      }

      .hero-illustration {
        transform: scale(0.8);
      }
    }

    @media (max-width: 768px) {
      .slogan {
        font-size: 32px;
      }

      .hero-illustration {
        flex-direction: column;
        gap: 20px;
      }

      .data-flow {
        display: none;
      }

      .container {
        padding: 24px;
      }

      .features, .start-section {
        flex: 1;
        min-width: 250px;
      }
    }
  </style>
</head>
<body>
  <!-- Logo背景墙 -->
  <div class="logo-wall">
    <svg viewBox="0 0 100 100" fill="currentColor">
      <circle cx="50" cy="50" r="40"/>

          <!-- 下方数据流：HR → 求职者 -->
          <div class="data-flow bottom">

        <div class="person-card">

    <!-- 右侧面板 -->
    <div class="side-panel">
      <!-- 核心功能介绍 -->
      <div class="features">
        <h3>核心功能</h3>
        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  </div>
</body>
